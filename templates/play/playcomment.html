<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游玩评价 · Life Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: url('../static/images/background/2.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #1a2a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none; z-index: 0;
        }
        .review-card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        .card-header {
            background: #2d3e2b;
            padding: 1.8rem 2rem;
            color: white;
        }
        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-header h2::before { content: "⭐"; font-size: 1.8rem; }
        .play-name {
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .card-body { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2d3e2b; }
        input, textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fefefe;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #ffb347; box-shadow: 0 0 0 3px rgba(255, 179, 71, 0.2); }
        textarea { resize: vertical; }
        .button-group { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn {
            flex: 1;
            text-align: center;
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: #ffb347; color: #2d3e2b; }
        .btn-primary:hover { background: #ff9f1c; transform: translateY(-2px); }
        .btn-secondary { background: #eef2f0; color: #2d3e2b; }
        .btn-secondary:hover { background: #e2e8e4; transform: translateY(-2px); }
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .card-body { padding: 1.5rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="review-card">
    <div class="card-header">
        <h2>游玩评价</h2>
        <div class="play-name">🎮 {{ order.play.name }}</div>
    </div>
    <div class="card-body">
        <form action="/playcomment/?orderid={{ order.id }}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="score">🎮 游玩评分 (0.1 ~ 5.0)</label>
                <input type="number" id="score" name="score" min="0.1" max="5.0" step="0.1" required placeholder="例如 4.5">
            </div>
            <div class="form-group">
                <label for="comment">💬 评论 (不超过200字)</label>
                <textarea id="comment" name="comment" rows="4" placeholder="分享您的游玩体验..." maxlength="200"></textarea>
            </div>
            <div class="button-group">
                <button type="submit" class="btn btn-primary">⭐ 提交评价</button>
                <a href="/space/" class="btn btn-secondary">👤 返回个人中心</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
