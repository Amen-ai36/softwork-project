services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-mysql-root-password}
      MYSQL_DATABASE: ${FOOD_DELIVER_DB_NAME:-the_food_mas2}
      MYSQL_USER: ${FOOD_DELIVER_DB_USER:-foodapp}
      MYSQL_PASSWORD: ${FOOD_DELIVER_DB_PASSWORD:-change-this-database-password}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data_hex2.sql:/docker-entrypoint-initdb.d/01-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-django-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-False}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-False}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DJANGO_STATIC_ROOT: /app/staticfiles
      FOOD_DELIVER_DB_NAME: ${FOOD_DELIVER_DB_NAME:-the_food_mas2}
      FOOD_DELIVER_DB_USER: ${FOOD_DELIVER_DB_USER:-foodapp}
      FOOD_DELIVER_DB_PASSWORD: ${FOOD_DELIVER_DB_PASSWORD:-change-this-database-password}
      FOOD_DELIVER_DB_HOST: db
      FOOD_DELIVER_DB_PORT: 3306
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      ALIYUN_BASE_URL: ${ALIYUN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    volumes:
      - staticfiles:/app/staticfiles
      - ./static:/app/static

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - ./static:/app/static:ro

volumes:
  mysql_data:
  staticfiles:
