<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单中心 · 骑手端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: url('../static/images/background/2.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #1a2a1a;
            min-height: 100vh;
            padding: 2rem;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none; z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: #1a5276;
            padding: 1.5rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h2::before { content: "🛵"; font-size: 1.8rem; }
        .user-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .user-btn:hover {
            background: #f39c12;
            color: #1a5276;
            border-color: #f39c12;
            transform: translateY(-2px);
        }
        .table-wrapper {
            overflow-x: auto;
            padding: 0 1rem 1.5rem 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            border-radius: 20px;
            overflow: hidden;
        }
        th {
            background-color: #eaf2f8;
            color: #1a5276;
            font-weight: 600;
            padding: 1rem 0.8rem;
            text-align: left;
            border-bottom: 2px solid #d4e6f1;
        }
        td {
            padding: 0.9rem 0.8rem;
            border-bottom: 1px solid #edf2f7;
            color: #1f2937;
        }
        tr:hover td { background-color: #fef9e6; transition: 0.1s; }
        .accept-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .accept-btn:hover {
            background: #219a52;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .empty-row td {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 2rem;
        }
        .emphasize {
            font-weight: bold;
            color: #e67e22;
            background-color: #fff3f0;
            padding: 0 4px;
            border-radius: 6px;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            th, td { padding: 0.6rem 0.4rem; font-size: 0.85rem; }
            .header h2 { font-size: 1.4rem; }
            .accept-btn { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>订单中心</h2>
        <a href="/space" class="user-btn">👤 个人中心</a>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>订单ID</th>
                    <th>美食名称</th>
                    <th>顾客</th>
                    <th>数量</th>
                    <th>总价</th>
                    <th>配送地址</th>
                    <th>下单时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td>#{{ order.id }}</td>
                    <td>{{ order.food.name }}</td>
                    <td>{{ order.user.username }}</td>
                    <td>{{ order.num }} 份</td>
                    <td>¥<span class="emphasize">{{ order.cost }}</span></td>
                    <td>{{ order.address }}</td>
                    <td>{{ order.time|date:"m-d H:i" }}</td>
                    <td>
                        <a href="/rider_accept/?orderid={{ order.id }}" class="accept-btn">📦 接单</a>
                    </td>
                </tr>
                {% empty %}
                <tr class="empty-row">
                    <td colspan="8">✨ 暂无待接订单，休息一下吧~</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
