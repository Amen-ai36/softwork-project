<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Life Master · 生活大师 | 美好生活由此开始</title>
    <!-- Google Fonts & 现代字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* 全新背景：高清美食背景图片 + 优雅深色后备色 */
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1920&h=1080&fit=crop&q=85') no-repeat center center fixed;
            background-size: cover;
            background-color: #1a2a1a; /* 后备色：深墨绿，与美食主题呼应，图片加载前可见 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* 增加轻微背景颗粒感/柔和过渡，提升图片与前景融合 */
            position: relative;
        }

        /* 可选：叠加一层极细腻的半透明柔光，让白色卡片更突出，同时保留图片质感 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片容器，保持原有质感 + 轻微半透明背景提升层次？不，维持纯白保证可读，但增添一丝轻盈玻璃感? 无需，原有白色+阴影足够清晰 */
        .hero {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.98); /* 近乎纯白，略微通透但完全不影响阅读 */
            border-radius: 2rem;
            box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(0px); /* 无需模糊，保持卡片锐利 */
            position: relative;
            z-index: 2;
        }

        /* 左侧品牌区：保留原有高级深绿色质感，与诱人背景图片形成精致对比 */
        .brand-section {
            flex: 1.2;
            background: #2d3e2b;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,150,0.12) 0%, rgba(0,0,0,0.2) 90%);
            padding: 3rem 2rem;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            backdrop-filter: brightness(1.02);
        }

        .brand-section h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .brand-section .tagline {
            font-size: 1.2rem;
            opacity: 0.92;
            margin-bottom: 2rem;
            line-height: 1.4;
            font-weight: 400;
        }

        .feature-list {
            list-style: none;
            margin-top: 2rem;
        }

        .feature-list li {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            font-size: 1rem;
            backdrop-filter: blur(2px);
        }

        .feature-list li::before {
            content: "✓";
            background: #ffb347;
            color: #2d3e2b;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* 右侧表单区 纯白干净 */
        .form-section {
            flex: 1;
            padding: 3rem 2rem;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .form-section .sub {
            color: #6b7280;
            margin-bottom: 2rem;
            border-bottom: 3px solid #ffb347;
            display: inline-block;
            padding-bottom: 0.35rem;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn {
            display: inline-block;
            text-align: center;
            padding: 0.9rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #ffb347;
            color: #2d3e2b;
            box-shadow: 0 8px 18px -6px rgba(255, 179, 71, 0.4);
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #ff9f1c;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px rgba(0, 0, 0, 0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #e5e7eb;
            color: #4b5563;
        }

        .btn-outline:hover {
            border-color: #ffb347;
            color: #ffb347;
            background: #fff7e8;
            transform: translateY(-2px);
        }

        .social-login {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .social-icons span {
            background: #f3f4f6;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-family: system-ui, -apple-system;
        }

        .social-icons span:hover {
            background: #ffb34720;
            transform: scale(1.08);
            color: #ff9f1c;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #9ca3af;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 16px;
                background-attachment: scroll; /* 移动端保证性能 */
            }
            .hero {
                flex-direction: column;
                border-radius: 1.5rem;
            }
            .brand-section {
                text-align: center;
                padding: 2rem 1.5rem;
            }
            .feature-list li {
                justify-content: center;
            }
            .form-section {
                padding: 2rem 1.5rem;
            }
            .brand-section h1 {
                font-size: 2.4rem;
            }
            .btn-primary {
                font-size: 1rem;
            }
        }

        /* 针对较大屏幕更精致的背景覆盖 */
        @media (min-width: 1400px) {
            body {
                background-size: cover;
                background-position: center 30%;
            }
        }

        /* 轻微的入场动画提升活力 */
        .hero {
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 针对图片加载失败后备渐变 (网速慢时美观) */
        @supports (background: url()) {
            .no-image-fallback {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="hero">
    <div class="brand-section">
        <h1>Life Master</h1>
        <div class="tagline">探索 · 记录 · 分享 每一刻幸福</div>
        <ul class="feature-list">
            <li>海量食谱与餐厅推荐</li>
            <li>酒店名宿，舒适住宿</li>
            <li>综合商城，畅快游玩</li>
            <li>与百万用户一起交流</li>
        </ul>
    </div>
    <div class="form-section">
        <h2>欢迎回来</h2>
        <div class="sub">开启你的美食之旅</div>

        <!-- 登录/注册表单保持原有路径，但增强视觉反馈 -->
        <form action="/account/login/" method="get">
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                    📱 密码登录
                </button>
            </div>
        </form>
        <form action="/account/register/" method="get">
            <div class="btn-group">
                <button type="submit" class="btn btn-outline">
                    📝 注册账号
                </button>
            </div>
        </form>

        <div class="social-login">
            <div>其他方式登录</div>
            <div class="social-icons">
                <span aria-label="Google登录">G</span>
                <span aria-label="微信登录">🛰️</span>
                <span aria-label="Apple登录">🍎</span>
            </div>
        </div>
        <footer>
            🔥 注册即表示同意《用户协议》和《隐私政策》
        </footer>
    </div>
</div>
</body>
</html>
